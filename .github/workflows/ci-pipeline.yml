name: CI Pipeline

# Trigger the workflow on Pull Requests to main or your testing branch
on:
  pull_request:
    branches:
      # - main # TODO: Enable later when finalized
      - feat/cicd # TODO: Remove this later when finalized

jobs:
  # -------------------------
  # BACKEND JOB (FastAPI)
  # -------------------------
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Execute commands inside the backend folder

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Adjust version to match your project

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install testing and linting tools if not in requirements.txt
          pip install pytest pytest-cov flake8

      - name: Check License Headers (Python)
        run: |
          # Matches "Copyright <4-digits> Google LLC" or "Copyright <4-digits>-<4-digits> Google LLC"
          # -E enables extended regex
          # . checks the current folder recursively (if your find supports it) or use find command below
          
          echo "Checking for license headers..."
          FAILED=0
          
          # Find all .py files and check the top 5 lines for the regex pattern
          for file in $(find . -name "*.py"); do
            if ! head -n 5 "$file" | grep -E -q "Copyright (20[0-9]{2}|20[0-9]{2}-20[0-9]{2}) Google LLC"; then
              echo "Error: License header missing or incorrect in $file"
              FAILED=1
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo "One or more files are missing the 'Copyright YYYY Google LLC' header."
            exit 1
          fi

      - name: Run Linting (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings (change to suit strictness)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Tests with Coverage
        run: |
          # Fails if coverage is below 80%
          pytest --cov=. --cov-fail-under=80 --cov-report=term-missing

  # -------------------------
  # FRONTEND JOB (Angular)
  # -------------------------
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Execute commands inside the frontend folder

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Adjust to match your Angular version
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check License Headers (Typescript)
        run: |
          echo "Checking for license headers..."
          FAILED=0
          
          # Find all .ts files in src/
          for file in $(find src -name "*.ts"); do
            if ! head -n 5 "$file" | grep -E -q "Copyright (20[0-9]{2}|20[0-9]{2}-20[0-9]{2}) Google LLC"; then
              echo "Error: License header missing or incorrect in $file"
              FAILED=1
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
             echo "One or more files are missing the 'Copyright YYYY Google LLC' header."
             exit 1
          fi

      - name: Run Linting
        run: npm run lint
        # Ensure your package.json has a "lint" script (e.g., "ng lint")

      - name: Run Tests (Headless)
        # We use a specific script to run Chrome Headless for CI environments
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless
