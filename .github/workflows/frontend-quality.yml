name: Frontend Quality

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - develop
      - test
    paths:
      - 'frontend/**'
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run GTS Lint
      run: |
        cd frontend
        npx gts lint
