name: License Check

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - develop
      - test
  push:
    branches: [main, develop, test]

jobs:
  license-check:
    name: License Header Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Run addlicense check
        run: |
          addlicense -check -c "Google LLC" -l apache $(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.scss" -o -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.sh" \) -not -path "*/node_modules/*" -not -path "*/.venv/*" -not -path "*/.git/*")
