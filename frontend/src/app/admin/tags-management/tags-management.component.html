<div class="p-6 text-white min-h-screen">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Tags Management</h1>
  </div>

  <!-- Create Tag -->
  <div class="mb-6 flex gap-4 items-center">
    <mat-form-field class="w-64">
      <mat-label>New Tag Name</mat-label>
      <input matInput [(ngModel)]="newTagName" placeholder="Enter tag name" (keyup.enter)="createTag()" />
    </mat-form-field>
    <studio-button variant="primary" size="medium" (click)="createTag()" [disabled]="!newTagName.trim()">
      Create Tag
    </studio-button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center py-8">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>

  <!-- Tags List -->
  <div *ngIf="!isLoading && dataSource.data.length > 0" class="overflow-hidden rounded-lg border border-neutral-800">
    <table mat-table [dataSource]="dataSource" class="min-w-full divide-y divide-neutral-800 bg-neutral-950">
  
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef
          class="px-6 py-3 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">ID</th>
        <td mat-cell *matCellDef="let tag" class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">{{ tag.id }}</td>
      </ng-container>
  
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef
          class="px-6 py-3 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">Name</th>
        <td mat-cell *matCellDef="let tag" class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">
          <span *ngIf="editingTagId !== tag.id">{{ tag.name }}</span>
          <input *ngIf="editingTagId === tag.id" matInput [(ngModel)]="editName"
            class="bg-neutral-800 text-white p-1 rounded" />
        </td>
      </ng-container>
  
      <!-- Color Column -->
      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef
          class="px-6 py-3 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">Color</th>
        <td mat-cell *matCellDef="let tag" class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded"
              [style.backgroundColor]="editingTagId === tag.id ? editColor : tag.color || '#E8EAED'"></div>
            <span *ngIf="editingTagId !== tag.id">{{ tag.color || '#E8EAED' }}</span>
            <input *ngIf="editingTagId === tag.id" type="color" [(ngModel)]="editColor" class="bg-transparent" />
          </div>
        </td>
      </ng-container>
  
      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
          class="px-6 py-3 text-right text-xs font-medium text-neutral-400 uppercase tracking-wider">Actions</th>
        <td mat-cell *matCellDef="let tag" class="px-6 py-4 whitespace-nowrap text-sm text-right">
          <ng-container *ngIf="editingTagId !== tag.id">
            <button mat-icon-button color="primary" (click)="startEdit(tag)" title="Edit Tag">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteTag(tag.id)" title="Delete Tag">
              <mat-icon>delete</mat-icon>
            </button>
          </ng-container>
          <ng-container *ngIf="editingTagId === tag.id">
            <button mat-icon-button color="primary" (click)="saveEdit(tag)" [disabled]="!editName.trim()" title="Save">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="cancelEdit()" title="Cancel">
              <mat-icon>close</mat-icon>
            </button>
          </ng-container>
        </td>
      </ng-container>
      
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
<mat-paginator [length]="totalItems" [pageSize]="limit" [pageSizeOptions]="[5, 10, 20]" (page)="handlePageEvent($event)"
  class="bg-neutral-950 text-white"></mat-paginator>
  </div>

  <!-- No Tags Message -->
  <div *ngIf="!isLoading && dataSource.data.length === 0" class="text-center py-8 text-neutral-400">
    <p>No tags found for this workspace.</p>
  </div>
</div>
